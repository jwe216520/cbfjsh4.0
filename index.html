<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">

    <title>靠北輔中 4.0</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<!-- Header 由 JS 載入 -->

<!-- Hero -->
<section class="hero">

    <img 
    src="hero-banner.png" 
    alt="匿名投稿平台" 
    class="hero-img"
    >

    <p>
        你想說的，我們幫你匿名發出去。
    </p>

    <a  href="https://submit.crush.ninja/cbfjsh" 
        target="_blank" 
        class="submit-btn"
    >
        立即投稿
    </a>

</section>

<!-- QUICK ACTION -->
<section class="glass-card quick-section">
    
    <h2>🚀 快速入口</h2>
    
    <p class="section-subtitle">
        一鍵進入你需要的功能
    </p>

    <div class="quick-grid">
        
        <a  href="https://submit.crush.ninja/cbfjsh" 
            target="_blank" 
            class="quick-card primary">
            
            ✍️ 匿名投稿
            <span>說出你不敢說的話</span>

        </a>

        <a href="report.html" class="quick-card">
           
            🚨 檢舉貼文
            <span>回報不當內容</span>

        </a>

        <a href="faq.html" class="quick-card">
            
            ❓ 常見問題
            <span>快速解答疑惑</span>

        </a>
    
    </div>

</section>

<!-- FEATURED ANNOUNCEMENT -->
<section class="glass-card featured">
    
    <h2>📢 重要公告</h2>

    <div class="announcement-box">
        
        <p>
            歡迎來到 <b>靠北輔中 4.0</b>
        </p>
        
        <p>
            本平台為匿名交流空間，請遵守版規並理性發言。
        </p>
        
        <p class="highlight">
            若發現不當內容，請使用檢舉功能或私訊管理員。
        </p>
    
    </div>

</section>

<!-- BRAND STORY -->
<section id="about" class="glass-card brand-story">
    
    <h2>關於我們</h2>

    <p>
        靠北輔中 4.0 是一個校園匿名交流平台，
        讓學生可以自由分享想法、情緒與校園日常。
    </p>

    <p>
        在這裡，你可以：
    </p>

    <ul class="brand-list">

        <li>🗣 表達想法，不必害怕</li>
        <li>💬 分享校園生活</li>
        <li>😶 匿名說出真心話</li>

    </ul>

    <p class="brand-slogan">
        我們不審查你的情緒，但會守住底線。
    </p>

</section>
